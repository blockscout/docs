  /v2/tokens/{address_hash_param}/holders/csv:
    get:
      callbacks: {}
      description: Exports the holders of a specific token as a CSV file.
      operationId: BlockScoutWeb.API.V2.CsvExportController.export_token_holders
      parameters:
        - description: API key for rate limiting or for sensitive endpoints
          in: query
          name: apikey
          required: false
          schema:
            type: string
            x-struct: null
            x-validate: null
        - description: Secret key for getting access to restricted resources
          in: query
          name: key
          required: false
          schema:
            type: string
            x-struct: null
            x-validate: null
        - description: Address hash in the path
          in: path
          name: address_hash_param
          required: true
          schema:
            $ref: '#/components/schemas/AddressHash'
        - description: Start of the time period (ISO 8601 format) in CSV export
          in: query
          name: from_period
          required: true
          schema:
            anyOf:
              - nullable: false
                pattern: ^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])(?:T(?:[01]\d|2[0-3])(?:(?::|%3A)[0-5]\d(?:(?::|%3A)[0-5]\d(?:\.\d{1,9})?)?)?(?:Z|(?:\+|%2B|-)(?:[01]\d|2[0-3])(?:(?::|%3A)[0-5]\d)?)?)?$
                type: string
                x-struct: null
                x-validate: null
              - $ref: '#/components/schemas/NullString'
            x-struct: null
            x-validate: null
        - description: End of the time period (ISO 8601 format) In CSV export
          in: query
          name: to_period
          required: true
          schema:
            anyOf:
              - nullable: false
                pattern: ^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])(?:T(?:[01]\d|2[0-3])(?:(?::|%3A)[0-5]\d(?:(?::|%3A)[0-5]\d(?:\.\d{1,9})?)?)?(?:Z|(?:\+|%2B|-)(?:[01]\d|2[0-3])(?:(?::|%3A)[0-5]\d)?)?)?$
                type: string
                x-struct: null
                x-validate: null
              - $ref: '#/components/schemas/NullString'
            x-struct: null
            x-validate: null
        - description: Filter type in CSV export
          in: query
          name: filter_type
          required: false
          schema:
            anyOf:
              - enum:
                  - address
                nullable: true
                type: string
                x-struct: null
                x-validate: null
              - $ref: '#/components/schemas/NullString'
            x-struct: null
            x-validate: null
        - description: Filter value in CSV export
          in: query
          name: filter_value
          required: false
          schema:
            anyOf:
              - enum:
                  - to
                  - from
                nullable: true
                type: string
                x-struct: null
                x-validate: null
              - $ref: '#/components/schemas/NullString'
            x-struct: null
            x-validate: null
      responses:
        '200':
          content:
            application/csv: {}
          description: CSV file of token holders.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
          description: Not Found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonErrorResponse'
          description: Unprocessable Entity
      summary: Export token holders as CSV
      tags:
        - tokens
  /v2/tokens/:
    get:
      callbacks: {}
      description: Retrieves a paginated list of tokens with optional filtering by name, symbol, or type.
      operationId: BlockScoutWeb.API.V2.TokenController.tokens_list
      parameters:
        - description: API key for rate limiting or for sensitive endpoints
          in: query
          name: apikey
          required: false
          schema:
            type: string
            x-struct: null
            x-validate: null
        - description: Secret key for getting access to restricted resources
          in: query
          name: key
          required: false
          schema:
            type: string
            x-struct: null
            x-validate: null
        - description: |
            Filter by token type. Comma-separated list of:
            * ERC-20 - Fungible tokens
            * ERC-721 - Non-fungible tokens
            * ERC-1155 - Multi-token standard
            * ERC-404 - Hybrid fungible/non-fungible tokens


            Example: `ERC-20,ERC-721` to show both fungible and NFT transfers
          in: query
          name: type
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/EmptyString'
              - pattern: ^\[?(ERC-20|ERC-721|ERC-1155|ERC-404|ERC-7984)(,(ERC-20|ERC-721|ERC-1155|ERC-404|ERC-7984))*\]?$
                type: string
                x-struct: null
                x-validate: null
            x-struct: null
            x-validate: null
        - description: Search query filter
          in: query
          name: q
          required: false
          schema:
            nullable: true
            type: string
            x-struct: null
            x-validate: null
        - description: Limit result items in the response
          in: query
          name: limit
          required: false
          schema:
            nullable: true
            type: integer
            x-struct: null
            x-validate: null
        - description: |
            Sort transactions by:
            * block_number - Sort by block number
            * value - Sort by transaction value
            * fee - Sort by transaction fee
            * balance - Sort by account balance
