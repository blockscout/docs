info:
  contact:
    email: info@blockscout.com
  title: Blockscout
  version: 10.0.1
openapi: 3.0.0
paths:
  /v2/blocks/{block_hash_or_number_param}/internal-transactions:
    get:
      callbacks: {}
      description: Retrieves internal transactions included in a specific block with optional filtering by type and call type.
      operationId: BlockScoutWeb.API.V2.BlockController.internal_transactions
      parameters:
        - description: API key for rate limiting or for sensitive endpoints
          in: query
          name: apikey
          required: false
          schema:
            type: string
            x-struct: null
            x-validate: null
        - description: Secret key for getting access to restricted resources
          in: query
          name: key
          required: false
          schema:
            type: string
            x-struct: null
            x-validate: null
        - description: Block hash or number in the path
          in: path
          name: block_hash_or_number_param
          required: true
          schema:
            anyOf:
              - minimum: 0
                type: integer
                x-struct: null
                x-validate: null
              - $ref: '#/components/schemas/FullHash'
            x-struct: null
            x-validate: null
        - description: |
            Filter internal transactions by type:
            * all - Show all internal transactions (default)
            * call - Only show call internal transactions
            * create - Only show create internal transactions
            * create2 - Only show create2 internal transactions
            * reward - Only show reward internal transactions
            * selfdestruct - Only show selfdestruct internal transactions
            * stop - Only show stop internal transactions
            * invalid - Only show invalid internal transactions (Arbitrum only)
          in: query
          name: internal_type
          required: false
          schema:
            enum:
              - call
              - create
              - create2
              - reward
              - selfdestruct
              - stop
              - invalid
            type: string
            x-struct: null
            x-validate: null
        - description: |
            Filter internal transactions by call type:
            * all - Show all internal transactions (default)
            * call - Only show call internal transactions
            * callcode - Only show callcode internal transactions
            * delegatecall - Only show delegatecall internal transactions
            * staticcall - Only show staticcall internal transactions
            * invalid - Only show invalid internal transactions (Arbitrum only)
          in: query
          name: call_type
          required: false
          schema:
            enum:
              - call
              - callcode
              - delegatecall
              - staticcall
              - invalid
            type: string
            x-struct: null
            x-validate: null
        - description: Transaction index for paging
          in: query
          name: transaction_index
          required: false
          schema:
            type: integer
            x-struct: null
            x-validate: null
        - description: Item index for paging
          in: query
          name: index
          required: false
          schema:
            type: integer
            x-struct: null
            x-validate: null
        - description: Number of items returned per page
          in: query
          name: items_count
          required: false
          schema:
            maximum: 50
            minimum: 1
            type: integer
            x-struct: null
            x-validate: null
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: false
                nullable: false
                properties:
                  items:
                    items:
                      $ref: '#/components/schemas/InternalTransaction'
                    nullable: false
                    type: array
                    x-struct: null
                    x-validate: null
                  next_page_params:
                    example:
                      index: 8
                      items_count: 50
                      transaction_index: 3
                    nullable: true
                    type: object
                    x-struct: null
                    x-validate: null
                required:
                  - items
                  - next_page_params
                type: object
                x-struct: null
                x-validate: null
          description: Internal transactions in the specified block.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
          description: Not Found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonErrorResponse'
          description: Unprocessable Entity
      summary: List internal transactions in a specific block
      tags:
        - blocks
  /v2/tokens/{address_hash_param}:
    get:
      callbacks: {}
      description: Retrieves detailed information for a specific token identified by its contract address.
      operationId: BlockScoutWeb.API.V2.TokenController.token
