  # ETH RPC API Endpoints (JSON-RPC Format)
  # These endpoints use POST requests to /api/eth-rpc
# Individual ETH RPC Method Endpoints
# These replace the single generic /eth-rpc endpoint


  /eth-rpc:
    post:
      operationId: eth-rpc-post
      summary: Ethereum JSON-RPC endpoint
      description: "Single endpoint for all standard Ethereum JSON-RPC 2.0 methods. Send a POST request with a JSON body specifying the `method` and `params`.\n\n**Supported methods:** `eth_blockNumber`, `eth_getBalance`, `eth_getLogs`, `eth_gasPrice`, `eth_getTransactionByHash`, `eth_getTransactionReceipt`, `eth_chainId`, `eth_maxPriorityFeePerGas`, `eth_getTransactionCount`, `eth_getCode`, `eth_getStorageAt`, `eth_estimateGas`, `eth_getBlockByNumber`, `eth_getBlockByHash`, `eth_sendRawTransaction`, `eth_call`\n\n**Example:**\n```\ncurl -H \"content-type: application/json\" -X POST \\\n  --data '{\"id\":0,\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[]}' \\\n  https://eth.blockscout.com/api/eth-rpc\n```"
      tags:
      - ETH RPC
      externalDocs:
        url: https://docs.blockscout.com/devs/apis/rpc/eth-rpc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - title: eth_blockNumber
                description: "Returns the latest block number in the chain in hexadecimal format.\n\n**JSON-RPC Method:** `eth_blockNumber`\n\nThis endpoint uses the standard Ethereum JSON-RPC 2.0 format."
                type: object
                required:
                - jsonrpc
                - method
                - id
                properties:
                  jsonrpc:
                    type: string
                    examples:
                      - '2.0'
                    description: JSON-RPC version
                    default: '2.0'
                    readOnly: true
                  method:
                    type: string
                    enum:
                    - eth_blockNumber
                    examples:
                      - eth_blockNumber
                    description: Must be "eth_blockNumber"
                  params:
                    type: array
                    description: No parameters required
                    maxItems: 0
                  id:
                    oneOf:
                    - type: integer
                    - type: string
                    examples:
                      - 1
                    description: |-
                      A client-defined identifier for this request. The server echoes it back unchanged
                      in the response, so you can match responses to requests. This is especially useful
                      when sending multiple calls in a batch. For single requests any value works — use
                      any integer (e.g. 1) or string (e.g. "my-request"). Set to null if you do not need
                      to correlate the response.
                example:
                  jsonrpc: "2.0"
                  method: "eth_blockNumber"
                  params: []
                  id: 1
              - title: eth_getBalance
                description: "Returns the balance of an account at a given address in wei (hexadecimal).\n\n**JSON-RPC Method:** `eth_getBalance`\n\nThis endpoint uses the standard Ethereum JSON-RPC 2.0 format."
                type: object
                required:
                - jsonrpc
                - method
                - id
                properties:
                  jsonrpc:
                    type: string
                    examples:
                      - '2.0'
                    description: JSON-RPC version
                    default: '2.0'
                    readOnly: true
                  method:
                    type: string
                    enum:
                    - eth_getBalance
                    examples:
                      - eth_getBalance
                    description: Must be "eth_getBalance"
                  params:
                    type: array
                    description: 'Parameters: [address, blockTag]'
                    minItems: 2
                    maxItems: 2
                    prefixItems:
                    - &id002
                      type: string
                      pattern: ^0x[a-fA-F0-9]{40}$
                      description: Ethereum address (20 bytes, hex-encoded with 0x prefix)
                      examples:
                        - '0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045'
                    - &id003
                      oneOf:
                      - type: string
                        enum:
                        - latest
                        - earliest
                        - pending
                        - safe
                        - finalized
                        description: Named block tag
                      - type: string
                        pattern: ^0x[a-fA-F0-9]+$
                        description: Block number as hex string
                      description: 'Block parameter: tag name or hex block number'
                      examples:
                        - latest
                  id:
                    oneOf:
                    - type: integer
                    - type: string
                    examples:
                      - 1
                    description: |-
                      A client-defined identifier for this request. The server echoes it back unchanged
                      in the response, so you can match responses to requests. This is especially useful
                      when sending multiple calls in a batch. For single requests any value works — use
                      any integer (e.g. 1) or string (e.g. "my-request"). Set to null if you do not need
                      to correlate the response.
                example:
                  jsonrpc: "2.0"
                  method: "eth_getBalance"
                  params:
                  - '0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045'
                  - latest
                  id: 1
              - title: eth_getLogs
                description: "Returns an array of logs matching a specified filter object. Maximum 1000 logs per request. Use pagination for more results.\n\n**JSON-RPC Method:** `eth_getLogs`\n\nThis endpoint uses the standard Ethereum JSON-RPC 2.0 format."
                type: object
                required:
                - jsonrpc
                - method
                - id
                properties:
                  jsonrpc:
                    type: string
                    examples:
                      - '2.0'
                    description: JSON-RPC version
                    default: '2.0'
                    readOnly: true
                  method:
                    type: string
                    enum:
                    - eth_getLogs
                    examples:
                      - eth_getLogs
                    description: Must be "eth_getLogs"
                  params:
                    type: array
                    description: 'Parameters: [filterObject]'
                    minItems: 1
                    maxItems: 1
                    prefixItems:
                    - type: object
                      description: Filter object for log queries
                      properties:
                        address:
                          oneOf:
                          - type: string
                            pattern: ^0x[a-fA-F0-9]{40}$
                          - type: array
                            items:
                              type: string
                              pattern: ^0x[a-fA-F0-9]{40}$
                          description: Contract address or list of addresses to filter logs from
                        fromBlock:
                          type: string
                          description: Start block (hex number or tag)
                          examples:
                            - '0x1234567'
                        toBlock:
                          type: string
                          description: End block (hex number or tag)
                          examples:
                            - latest
                        topics:
                          type: array
                          description: Array of 32-byte topics for filtering. Use null for wildcard positions.
                          items:
                            oneOf:
                            - type: string
                              pattern: ^0x[a-fA-F0-9]{64}$
                            - type: array
                              items:
                                type: string
                                pattern: ^0x[a-fA-F0-9]{64}$
                            - type: 'null'
                        blockHash:
                          type: string
                          pattern: ^0x[a-fA-F0-9]{64}$
                          description: Filter logs from a specific block hash (mutually exclusive with fromBlock/toBlock)
                  id:
                    oneOf:
                    - type: integer
                    - type: string
                    examples:
                      - 1
                    description: |-
                      A client-defined identifier for this request. The server echoes it back unchanged
                      in the response, so you can match responses to requests. This is especially useful
                      when sending multiple calls in a batch. For single requests any value works — use
                      any integer (e.g. 1) or string (e.g. "my-request"). Set to null if you do not need
                      to correlate the response.
