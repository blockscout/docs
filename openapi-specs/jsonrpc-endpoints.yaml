                  jsonrpc: "2.0"
                  method: "eth_getLogs"
                  params:
                  - address: '0x6B175474E89094C44Da98b954EedeAC495271d0F'
                    fromBlock: '0x1234567'
                    toBlock: latest
                    topics:
                    - '0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef'
                  id: 1
              - title: eth_gasPrice
                description: "Returns the current gas price in wei (hexadecimal).\n\n**JSON-RPC Method:** `eth_gasPrice`\n\nThis endpoint uses the standard Ethereum JSON-RPC 2.0 format."
                type: object
