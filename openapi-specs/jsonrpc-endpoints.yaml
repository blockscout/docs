  schemas:
    AddressHash:
      type: string
      pattern: '^0x[a-fA-F0-9]{40}$'
      examples:
        - '0xde0b295669a9fd93d5f28d9ec85e40f4cb697bae'
      description: 40-character hexadecimal address hash with 0x prefix

    TransactionHash:
      type: string
      pattern: '^0x[a-fA-F0-9]{64}$'
      examples:
        - '0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef'
      description: 64-character hexadecimal transaction hash with 0x prefix

    ResponseOK:
      type: object
      properties:
        status:
          type: string
          enum: ['1']
          description: Status code (1 = OK)
        message:
          type: string
          examples:
            - 'OK'
          description: Response message

    ResponseNOTOK:
      type: object
      properties:
        status:
          type: string
          enum: ['0']
          description: Status code (0 = Error)
        message:
          type: string
          examples:
            - 'NOTOK'
          description: Error message
        result:
          type: [string, 'null']
          description: Error details

    Transaction:
      type: object
      properties:
        blockNumber:
          type: string
        timeStamp:
          type: string
        hash:
          $ref: '#/components/schemas/TransactionHash'
        nonce:
          type: string
        blockHash:
          type: string
        transactionIndex:
          type: string
        from:
          $ref: '#/components/schemas/AddressHash'
        to:
          $ref: '#/components/schemas/AddressHash'
        value:
          type: string
          description: Value in wei
        gas:
          type: string
        gasPrice:
          type: string
        isError:
          type: string
          enum: ['0', '1']
        txreceipt_status:
          type: string
          enum: ['0', '1']
        input:
          type: string
        contractAddress:
          $ref: '#/components/schemas/AddressHash'
        cumulativeGasUsed:
          type: string
        gasUsed:
          type: string
        confirmations:
          type: string

    InternalTransaction:
      type: object
      properties:
        blockNumber:
          type: string
        timeStamp:
          type: string
        hash:
          $ref: '#/components/schemas/TransactionHash'
        from:
          $ref: '#/components/schemas/AddressHash'
        to:
          $ref: '#/components/schemas/AddressHash'
        value:
          type: string
          description: Value in wei
        contractAddress:
          $ref: '#/components/schemas/AddressHash'
        input:
          type: string
        type:
          type: string
          enum: [call, create, suicide, reward]
        gas:
          type: string
        gasUsed:
          type: string
        traceId:
          type: string
        isError:
          type: string
          enum: ['0', '1']
        errCode:
