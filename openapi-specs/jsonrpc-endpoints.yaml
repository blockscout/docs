                  params:
                  - '0x295a70b2de5e3953354a6a8344e616ed314d7251'
                  - '0x0'
                  - latest
                  id: 1
              - title: eth_estimateGas
                description: "Generates and returns an estimate of how much gas is necessary to allow the transaction to complete.\n\n**JSON-RPC Method:** `eth_estimateGas`\n\nThis endpoint uses the standard Ethereum JSON-RPC 2.0 format."
                type: object
                required:
                - jsonrpc
                - method
                - id
                properties:
                  jsonrpc:
                    type: string
                    examples:
                      - '2.0'
                    description: JSON-RPC version
                    default: '2.0'
                    readOnly: true
                  method:
                    type: string
                    enum:
                    - eth_estimateGas
                    examples:
                      - eth_estimateGas
                    description: Must be "eth_estimateGas"
                  params:
                    type: array
                    description: 'Parameters: [transactionObject, blockTag (optional)]'
                    minItems: 1
                    maxItems: 2
                    prefixItems:
                    - type: object
                      description: Transaction object for gas estimation
                      required:
                      - to
                      properties:
                        from:
                          type: string
                          pattern: ^0x[a-fA-F0-9]{40}$
                          description: Sender address
                        to:
                          type: string
                          pattern: ^0x[a-fA-F0-9]{40}$
                          description: Recipient or contract address
                        gas:
                          type: string
                          pattern: ^0x[a-fA-F0-9]+$
                          description: Gas limit as hex
                        gasPrice:
                          type: string
                          pattern: ^0x[a-fA-F0-9]+$
                          description: Gas price in wei as hex
                        value:
                          type: string
                          pattern: ^0x[a-fA-F0-9]+$
                          description: Value in wei as hex
                        data:
                          type: string
                          pattern: ^0x[a-fA-F0-9]*$
                          description: Contract call data as hex
                    - *id003
                  id:
                    oneOf:
                    - type: integer
                    - type: string
                    examples:
                      - 1
                    description: |-
                      A client-defined identifier for this request. The server echoes it back unchanged
                      in the response, so you can match responses to requests. This is especially useful
                      when sending multiple calls in a batch. For single requests any value works — use
                      any integer (e.g. 1) or string (e.g. "my-request"). Set to null if you do not need
                      to correlate the response.
                example:
                  jsonrpc: "2.0"
                  method: "eth_estimateGas"
                  params:
                  - from: '0x8D97689C9818892B700e27F316cc3E41e17fBeb9'
                    to: '0xd3CdA913deB6f67967B99D67aCDFa1712C293601'
                    value: '0x186a0'
                  - latest
                  id: 1
              - title: eth_getBlockByNumber
                description: "Returns information about a block by block number.\n\n**JSON-RPC Method:** `eth_getBlockByNumber`\n\nThis endpoint uses the standard Ethereum JSON-RPC 2.0 format."
                type: object
                required:
                - jsonrpc
                - method
                - id
                properties:
                  jsonrpc:
                    type: string
                    examples:
                      - '2.0'
                    description: JSON-RPC version
                    default: '2.0'
                    readOnly: true
                  method:
                    type: string
                    enum:
                    - eth_getBlockByNumber
                    examples:
                      - eth_getBlockByNumber
                    description: Must be "eth_getBlockByNumber"
                  params:
                    type: array
                    description: 'Parameters: [blockNumber, fullTransactions]'
                    minItems: 2
                    maxItems: 2
                    prefixItems:
                    - type: string
                      pattern: ^0x[a-fA-F0-9]+$
                      description: Block number as hex string
                      examples:
                        - '0x1234567'
                    - &id004
                      type: boolean
                      description: If true, returns full transaction objects; if false, returns only transaction hashes
                      examples:
                        - false
                  id:
                    oneOf:
                    - type: integer
                    - type: string
                    examples:
                      - 1
                    description: |-
                      A client-defined identifier for this request. The server echoes it back unchanged
                      in the response, so you can match responses to requests. This is especially useful
                      when sending multiple calls in a batch. For single requests any value works — use
                      any integer (e.g. 1) or string (e.g. "my-request"). Set to null if you do not need
                      to correlate the response.
                example:
                  jsonrpc: "2.0"
                  method: "eth_getBlockByNumber"
                  params:
                  - '0x1234567'
                  - false
                  id: 1
              - title: eth_getBlockByHash
                description: "Returns information about a block by block hash.\n\n**JSON-RPC Method:** `eth_getBlockByHash`\n\nThis endpoint uses the standard Ethereum JSON-RPC 2.0 format."
                type: object
                required:
                - jsonrpc
                - method
                - id
                properties:
                  jsonrpc:
                    type: string
                    examples:
                      - '2.0'
                    description: JSON-RPC version
                    default: '2.0'
                    readOnly: true
                  method:
                    type: string
                    enum:
                    - eth_getBlockByHash
                    examples:
                      - eth_getBlockByHash
                    description: Must be "eth_getBlockByHash"
                  params:
                    type: array
                    description: 'Parameters: [blockHash, fullTransactions]'
                    minItems: 2
                    maxItems: 2
                    prefixItems:
                    - type: string
                      pattern: ^0x[a-fA-F0-9]{64}$
                      description: Block hash (32 bytes, hex-encoded with 0x prefix)
                      examples:
                        - '0x9b83c12c69edb74f6c8dd5d052765c1adf940e320bd1291696e6fa07829eee71'
                    - *id004
                  id:
                    oneOf:
                    - type: integer
                    - type: string
                    examples:
                      - 1
                    description: |-
                      A client-defined identifier for this request. The server echoes it back unchanged
                      in the response, so you can match responses to requests. This is especially useful
                      when sending multiple calls in a batch. For single requests any value works — use
                      any integer (e.g. 1) or string (e.g. "my-request"). Set to null if you do not need
                      to correlate the response.
                example:
                  jsonrpc: "2.0"
                  method: "eth_getBlockByHash"
                  params:
                  - '0x9b83c12c69edb74f6c8dd5d052765c1adf940e320bd1291696e6fa07829eee71'
                  - false
                  id: 1
              - title: eth_sendRawTransaction
                description: "Submits a pre-signed transaction for broadcast to the Ethereum network.\n\n**JSON-RPC Method:** `eth_sendRawTransaction`\n\nThis endpoint uses the standard Ethereum JSON-RPC 2.0 format."
                type: object
                required:
                - jsonrpc
                - method
                - id
                properties:
                  jsonrpc:
                    type: string
                    examples:
                      - '2.0'
                    description: JSON-RPC version
                    default: '2.0'
                    readOnly: true
                  method:
                    type: string
                    enum:
                    - eth_sendRawTransaction
                    examples:
                      - eth_sendRawTransaction
                    description: Must be "eth_sendRawTransaction"
                  params:
                    type: array
                    description: 'Parameters: [signedTransactionData]'
                    minItems: 1
                    maxItems: 1
                    prefixItems:
                    - type: string
                      pattern: ^0x[a-fA-F0-9]+$
                      description: Signed transaction data as RLP-encoded hex string
                      examples:
                        - '0xf86c098504a817c800825208943535353535353535353535353535353535353535880de0b6b3a76400008025a028ef61340bd939bc2195fe537567866003e1a15d3c71ff63e1590620aa636276a067cbe9d8997f761aecb703304b3800ccf555c9f3dc64214b297fb1966a3b6d83'
                  id:
                    oneOf:
                    - type: integer
                    - type: string
                    examples:
                      - 1
                    description: |-
                      A client-defined identifier for this request. The server echoes it back unchanged
                      in the response, so you can match responses to requests. This is especially useful
                      when sending multiple calls in a batch. For single requests any value works — use
                      any integer (e.g. 1) or string (e.g. "my-request"). Set to null if you do not need
                      to correlate the response.
                example:
                  jsonrpc: "2.0"
                  method: "eth_sendRawTransaction"
                  params:
                  - '0xf86c098504a817c800825208943535353535353535353535353535353535353535880de0b6b3a76400008025a028ef61340bd939bc2195fe537567866003e1a15d3c71ff63e1590620aa636276a067cbe9d8997f761aecb703304b3800ccf555c9f3dc64214b297fb1966a3b6d83'
                  id: 1
              - title: eth_call
                description: "Executes a new message call immediately without creating a transaction on the blockchain. Used for reading contract state.\n\n**JSON-RPC Method:** `eth_call`\n\nThis endpoint uses the standard Ethereum JSON-RPC 2.0 format."
                type: object
                required:
                - jsonrpc
                - method
                - id
                properties:
                  jsonrpc:
                    type: string
                    examples:
                      - '2.0'
                    description: JSON-RPC version
                    default: '2.0'
                    readOnly: true
                  method:
                    type: string
                    enum:
                    - eth_call
                    examples:
                      - eth_call
                    description: Must be "eth_call"
                  params:
                    type: array
                    description: 'Parameters: [callObject, blockTag]'
                    minItems: 2
                    maxItems: 2
                    prefixItems:
                    - type: object
                      description: Transaction call object
                      properties:
                        from:
                          type: string
                          pattern: ^0x[a-fA-F0-9]{40}$
                          description: Sender address (optional)
                        to:
                          type: string
                          pattern: ^0x[a-fA-F0-9]{40}$
                          description: Target contract address
                        gas:
                          type: string
                          pattern: ^0x[a-fA-F0-9]+$
                          description: Gas limit as hex (optional)
                        gasPrice:
                          type: string
                          pattern: ^0x[a-fA-F0-9]+$
                          description: Gas price in wei as hex (optional)
                        value:
                          type: string
                          pattern: ^0x[a-fA-F0-9]+$
                          description: Value to send in wei as hex (optional)
                        data:
                          type: string
                          pattern: ^0x[a-fA-F0-9]*$
                          description: Encoded contract method call data
                    - *id003
                  id:
                    oneOf:
                    - type: integer
                    - type: string
                    examples:
                      - 1
                    description: |-
                      A client-defined identifier for this request. The server echoes it back unchanged
                      in the response, so you can match responses to requests. This is especially useful
                      when sending multiple calls in a batch. For single requests any value works — use
                      any integer (e.g. 1) or string (e.g. "my-request"). Set to null if you do not need
                      to correlate the response.
                example:
                  jsonrpc: "2.0"
                  method: "eth_call"
                  params:
                  - to: '0x6B175474E89094C44Da98b954EedeAC495271d0F'
                    data: '0x70a082310000000000000000000000006E0d01A76C3Cf4288372a29124A26D4353EE51BE'
                  - latest
                  id: 1
              discriminator:
                propertyName: method
                mapping:
                  eth_blockNumber: '#/components/schemas/EthRpc_eth_blockNumber'
                  eth_getBalance: '#/components/schemas/EthRpc_eth_getBalance'
                  eth_getLogs: '#/components/schemas/EthRpc_eth_getLogs'
                  eth_gasPrice: '#/components/schemas/EthRpc_eth_gasPrice'
                  eth_getTransactionByHash: '#/components/schemas/EthRpc_eth_getTransactionByHash'
                  eth_getTransactionReceipt: '#/components/schemas/EthRpc_eth_getTransactionReceipt'
                  eth_chainId: '#/components/schemas/EthRpc_eth_chainId'
                  eth_maxPriorityFeePerGas: '#/components/schemas/EthRpc_eth_maxPriorityFeePerGas'
                  eth_getTransactionCount: '#/components/schemas/EthRpc_eth_getTransactionCount'
                  eth_getCode: '#/components/schemas/EthRpc_eth_getCode'
                  eth_getStorageAt: '#/components/schemas/EthRpc_eth_getStorageAt'
                  eth_estimateGas: '#/components/schemas/EthRpc_eth_estimateGas'
                  eth_getBlockByNumber: '#/components/schemas/EthRpc_eth_getBlockByNumber'
                  eth_getBlockByHash: '#/components/schemas/EthRpc_eth_getBlockByHash'
                  eth_sendRawTransaction: '#/components/schemas/EthRpc_eth_sendRawTransaction'
                  eth_call: '#/components/schemas/EthRpc_eth_call'
            example:
              jsonrpc: '2.0'
              method: eth_blockNumber
              params: []
              id: 1
      responses:
        '200':
          description: Successful JSON-RPC 2.0 response
          content:
            application/json:
              schema:
                type: object
                properties:
                  jsonrpc:
                    type: string
                    examples:
                      - '2.0'
                  result:
                    description: Method result (type varies by method)
                  error:
                    type: object
                    description: Present only on error
                    properties:
                      code:
                        type: integer
                        examples:
                          - -32602
                      message:
                        type: string
                        examples:
                          - Invalid params
                  id:
                    oneOf:
                    - type: integer
                    - type: string
                    examples:
                      - 1
              examples:
                eth_blockNumber:
                  summary: eth_blockNumber response
                  value:
                    jsonrpc: '2.0'
                    result: '0x1234567'
                    id: 1
                eth_getBalance:
                  summary: eth_getBalance response
                  value:
                    jsonrpc: '2.0'
                    result: '0x0234c8a3397aab58'
                    id: 1
                error:
                  summary: Error response
                  value:
                    jsonrpc: '2.0'
                    error:
                      code: -32602
                      message: Invalid params
                    id: 1
      security:
      - apiKeyAuth: []
      - {}
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: query
      name: apikey
      description: |
        Optional API key for increased rate limits.

        **Without API key:**
        - 5 requests per second (shared pool)
        - No registration required

        **With API key:**
        - 10 requests per second per key
        - Up to 3 free keys per account
        - Get your API key at https://blockscout.com (login required)

        Usage: Add `apikey=YOUR_KEY` to any request query string.

